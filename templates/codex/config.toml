# Codex subagent configuration
# Generated by agentboard init. Customize agent roles after activation.
# Docs: https://developers.openai.com/codex/subagents

[agents]
max_threads = 4   # max parallel agents running at once
max_depth   = 1   # root agent may spawn children; children cannot spawn further

# ── Generic roles ─────────────────────────────────────────────────────────────
# The LLM replaces these with project-specific roles during activation.
# Add one [[agents.<name>]] block + matching .codex/agents/<name>.toml per role.

[agents.researcher]
description = "Read-only codebase explorer — research, mapping, audit, doc writing"
config_file = "agents/researcher.toml"

[agents.coder]
description = "Implementation agent — writes and edits production code"
config_file = "agents/coder.toml"

[agents.auditor]
description = "Code review, security audit, test writing, verification"
config_file = "agents/auditor.toml"

[agents.mapper]
description = "Fast file discovery, grep, glob — trivial mechanical ops"
config_file = "agents/mapper.toml"

# ── Agentboard dashboard telemetry ───────────────────────────────────────────
# Codex loads project hooks only after the project .codex/ layer is trusted.
# These hooks normalize Codex lifecycle/tool events into the same local files
# used by Claude Code:
#   - ~/.agentboard/sessions/<session>.json
#   - .platform/events.jsonl

[[hooks.SessionStart]]
matcher = "startup|resume|clear|compact"

[[hooks.SessionStart.hooks]]
type = "command"
command = 'AGENTBOARD_PROVIDER=codex AGENTBOARD_CODEX_HOOK_EVENT=SessionStart node "$(git rev-parse --show-toplevel)/.platform/scripts/hooks/codex-hook-bridge.js"'
timeout = 10
statusMessage = "Agentboard: starting Codex session"

[[hooks.PostToolUse]]
matcher = "*"

[[hooks.PostToolUse.hooks]]
type = "command"
command = 'AGENTBOARD_PROVIDER=codex AGENTBOARD_CODEX_HOOK_EVENT=PostToolUse node "$(git rev-parse --show-toplevel)/.platform/scripts/hooks/codex-hook-bridge.js"'
timeout = 10
statusMessage = "Agentboard: logging Codex activity"

[[hooks.SubagentStart]]
matcher = "*"

[[hooks.SubagentStart.hooks]]
type = "command"
command = 'AGENTBOARD_PROVIDER=codex AGENTBOARD_CODEX_HOOK_EVENT=SubagentStart node "$(git rev-parse --show-toplevel)/.platform/scripts/hooks/codex-hook-bridge.js"'
timeout = 10
statusMessage = "Agentboard: tracking Codex subagent"

[[hooks.SubagentStop]]
matcher = "*"

[[hooks.SubagentStop.hooks]]
type = "command"
command = 'AGENTBOARD_PROVIDER=codex AGENTBOARD_CODEX_HOOK_EVENT=SubagentStop node "$(git rev-parse --show-toplevel)/.platform/scripts/hooks/codex-hook-bridge.js"'
timeout = 10
statusMessage = "Agentboard: finishing Codex subagent"

[[hooks.Stop]]

[[hooks.Stop.hooks]]
type = "command"
command = 'AGENTBOARD_PROVIDER=codex AGENTBOARD_CODEX_HOOK_EVENT=Stop node "$(git rev-parse --show-toplevel)/.platform/scripts/hooks/codex-hook-bridge.js"'
timeout = 10
statusMessage = "Agentboard: ending Codex session"
