name: ci

# Merge gate for agentboard.
#
# This workflow runs on:
# - PRs targeting develop or main (to block bad merges before merge)
# - direct pushes to develop or main (to validate the merge commit itself)
#
# To actually block merges, configure GitHub branch protection / rulesets to
# require these status checks on develop and main:
#   - unit-tests
#   - integration-tests
#   - agentboard-validate
#   - ci-gate
#
# macOS jobs (unit-tests-macos, integration-tests-macos) run the suites under
# the system /bin/bash (3.2) and gate the merge via ci-gate's needs list.
#
# HUD health: ![ci](https://github.com/danilulmashev/agentboard/actions/workflows/ci.yml/badge.svg)

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run unit tests
        shell: bash
        run: |
          set -euo pipefail
          bash tests/unit.sh

  integration-tests:
    name: integration-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run integration tests
        shell: bash
        run: |
          set -euo pipefail
          bash tests/integration.sh

  unit-tests-macos:
    name: unit-tests-macos
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run unit tests (system bash 3.2)
        shell: bash
        run: |
          set -euo pipefail
          /bin/bash --version
          /bin/bash tests/unit.sh

  integration-tests-macos:
    name: integration-tests-macos
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run integration tests (system bash 3.2)
        shell: bash
        run: |
          set -euo pipefail
          /bin/bash --version
          /bin/bash tests/integration.sh

  agentboard-validate:
    name: agentboard skill validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate skill pack
        run: bash bin/agentboard validate --ci
      - name: Run unit tests
        run: bash tests/unit.sh

  ci-gate:
    name: ci-gate
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      - integration-tests
      - unit-tests-macos
      - integration-tests-macos
      - agentboard-validate
    steps:
      - name: Confirm merge gate is green
        shell: bash
        run: |
          set -euo pipefail
          echo "unit-tests and integration-tests passed on ubuntu and macos."
